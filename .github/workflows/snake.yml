name: generate anim

on:
  # har 24 soatda avto-run bo'ladi
  schedule:
    - cron: "0 0 * * *"
  
  # qo'lda ishga tushirish tugmasi uchun
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # github-contribution-grid-snake.svg va github-contribution-grid-snake-dark.svg generatsiya qilish
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            
      # generatsiya bo'lgan faylni output branch'ga push qilish
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
